<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naseef P P — Actor · Director</title>

  <!-- YouTube IFrame API — required for video-end auto-close -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { void:'#080810',reel:'#0E0E1C',gold:'#D4A953',crimson:'#C0392B',ivory:'#F5EDD8',ash:'#7A7060' },
          fontFamily: { display:['"Cormorant Garamond"','serif'], poster:['"Bebas Neue"','cursive'], body:['"DM Sans"','sans-serif'] }
        }
      }
    }
  </script>

  <style>
    /* ══ RESET ══════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#080810;color:#F5EDD8;font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none}

    /* ══ CURSOR ═════════════════════════════════════════════ */
    #cursor-outer{position:fixed;width:36px;height:36px;border:1.5px solid #D4A953;border-radius:50%;pointer-events:none;z-index:9999;transition:transform .15s ease,border-color .2s;transform:translate(-50%,-50%)}
    #cursor-inner{position:fixed;width:6px;height:6px;background:#D4A953;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}

    /* ══ GRAIN ══════════════════════════════════════════════ */
    #grain{position:fixed;inset:-200%;width:400%;height:400%;pointer-events:none;z-index:1;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain .8s steps(2) infinite}
    @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-3%,-4%)}50%{transform:translate(4%,2%)}75%{transform:translate(-2%,5%)}100%{transform:translate(3%,-3%)}}

    /* ══ SCROLLBAR ══════════════════════════════════════════ */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#080810}
    ::-webkit-scrollbar-thumb{background:#D4A953;border-radius:2px}

    /* ══ NAV ════════════════════════════════════════════════ */
    #navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:background .4s,padding .4s}
    #navbar.scrolled{background:rgba(8,8,16,.92);backdrop-filter:blur(14px);padding:1rem 3rem;border-bottom:1px solid rgba(212,169,83,.12)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;letter-spacing:.05em;color:#F5EDD8;text-decoration:none}
    .nav-logo span{color:#D4A953}
    .glitch{position:relative;display:inline-block}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;opacity:0}
    .glitch:hover::before{opacity:.6;color:#C0392B;clip:rect(0,900px,20px,0);animation:gt .4s steps(2) infinite;left:2px}
    .glitch:hover::after{opacity:.6;color:#D4A953;clip:rect(30px,900px,60px,0);animation:gb .4s steps(2) infinite;left:-2px}
    @keyframes gt{0%{clip:rect(0,900px,10px,0)}50%{clip:rect(15px,900px,25px,0)}100%{clip:rect(5px,900px,18px,0)}}
    @keyframes gb{0%{clip:rect(35px,900px,55px,0)}50%{clip:rect(20px,900px,40px,0)}100%{clip:rect(40px,900px,60px,0)}}
    .nav-link{font-size:.75rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:#7A7060;text-decoration:none;position:relative;transition:color .3s}
    .nav-link::after{content:'';position:absolute;bottom:-3px;left:0;right:100%;height:1px;background:#D4A953;transition:right .3s}
    .nav-link:hover{color:#D4A953}
    .nav-link:hover::after{right:0}

    /* ══ HERO ═══════════════════════════════════════════════ */
    #hero{position:relative;height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
    .hero-top-grad{position:absolute;top:0;left:0;right:0;height:190px;background:linear-gradient(to bottom,rgba(8,8,16,.72),transparent);z-index:3;pointer-events:none}
    .hero-bg-overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(8,8,16,1) 0%,rgba(8,8,16,.88) 45%,rgba(8,8,16,.18) 75%,rgba(8,8,16,.5) 100%);z-index:1}
    .hero-line{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,#D4A953 30%,#D4A953 70%,transparent);z-index:2}
    .hero-line-left{opacity:.3}
    .hero-line-right{opacity:.3}
    .hero-content{position:relative;z-index:4;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4rem 5rem 4rem}
    .hero-eyebrow{font-size:.7rem;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:#D4A953;margin-bottom:1.2rem;display:flex;align-items:center;gap:.75rem;opacity:0;animation:fadeUp .8s ease .4s forwards}
    .hero-eyebrow::before{content:'';display:inline-block;width:2rem;height:1px;background:#D4A953}
    .hero-name{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,7vw,6.5rem);font-weight:700;line-height:.92;color:#F5EDD8;margin-bottom:1rem;opacity:0;animation:fadeUp .9s ease .6s forwards}
    .hero-name em{font-style:italic;color:#D4A953}
    .hero-subrole{font-family:'Bebas Neue',cursive;font-size:clamp(.75rem,1.2vw,1rem);letter-spacing:.35em;color:#7A7060;margin-bottom:1.75rem;opacity:0;animation:fadeUp .9s ease .75s forwards}
    .hero-subrole span{color:rgba(212,169,83,.4);margin:0 .5rem}
    .typewriter-wrap{display:flex;align-items:center;gap:.5rem;height:1.5rem;margin-bottom:3rem;opacity:0;animation:fadeUp .9s ease .9s forwards}
    .typewriter-prefix{font-size:.8rem;color:#7A7060;letter-spacing:.1em;font-weight:300}
    #typewriter{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:#D4A953;border-right:2px solid #D4A953;white-space:nowrap;overflow:hidden;animation:blink .75s step-end infinite}
    @keyframes blink{50%{border-color:transparent}}
    .hero-cta-group{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp .9s ease 1.05s forwards}
    .btn-primary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;background:#D4A953;color:#080810;font-size:.75rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:all .3s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%)}
    .btn-primary:hover{background:#F5EDD8;transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,169,83,.25)}
    .btn-secondary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;border:1px solid rgba(212,169,83,.35);color:#D4A953;font-size:.75rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:all .3s}
    .btn-secondary:hover{border-color:#D4A953;background:rgba(212,169,83,.08)}
    .hero-image-panel{position:relative;z-index:2;overflow:hidden}
    .hero-image-panel img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:grayscale(15%) contrast(1.05);transition:filter .5s}
    .hero-image-panel:hover img{filter:grayscale(0%) contrast(1.08)}
    .frame-corner{position:absolute;width:28px;height:28px;border-color:#D4A953;border-style:solid;z-index:5;pointer-events:none}
    .frame-corner.tl{top:1rem;left:1rem;border-width:2px 0 0 2px}
    .frame-corner.tr{top:1rem;right:1rem;border-width:2px 2px 0 0}
    .frame-corner.bl{bottom:1rem;left:1rem;border-width:0 0 2px 2px}
    .frame-corner.br{bottom:1rem;right:1rem;border-width:0 2px 2px 0}
    .scroll-indicator{position:absolute;bottom:2.5rem;right:2rem;z-index:6;display:flex;flex-direction:column;align-items:center;gap:.75rem;opacity:0;animation:fadeIn 1s ease 1.6s forwards}
    .scroll-text{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(245,237,216,.5);writing-mode:vertical-rl}
    .scroll-line{width:1px;height:55px;background:linear-gradient(to bottom,rgba(212,169,83,.8),transparent);animation:sp 2s ease infinite}
    @keyframes sp{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.15)}}

    /* ══ LANGUAGE VIDEO MODAL ════════════════════════════════ */
    #lang-modal{position:fixed;inset:0;background:rgba(8,8,16,.95);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
    #lang-modal.open{display:flex}
    .lang-modal-inner{position:relative;width:min(360px,90vw)}
    /* YouTube Shorts 9:16 ratio */
    .lang-modal-video{position:relative;width:100%;padding-top:177.78%;background:#0E0E1C;border:1px solid rgba(212,169,83,.2)}
    #yt-player-container{position:absolute;inset:0}
    /* YT API injects iframe into #yt-player — make it fill container */
    #yt-player{width:100%;height:100%}
    #yt-player iframe{width:100%!important;height:100%!important}
    #lang-modal-close{position:absolute;top:-2.75rem;right:0;color:#7A7060;font-size:1.6rem;cursor:pointer;transition:color .3s;background:none;border:none;line-height:1;padding:.25rem .5rem}
    #lang-modal-close:hover{color:#D4A953}
    .lang-modal-label{text-align:center;margin-top:.75rem;font-size:.65rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:#7A7060}

    /* ══ ANIMATIONS ══════════════════════════════════════════ */
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .reveal{opacity:0;transform:translateY(40px);transition:opacity .8s ease,transform .8s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .delay-1{transition-delay:.1s}.delay-2{transition-delay:.2s}.delay-3{transition-delay:.3s}
    .delay-4{transition-delay:.4s}.delay-5{transition-delay:.5s}.delay-6{transition-delay:.6s}

    /* ══ TICKER ═════════════════════════════════════════════ */
    .ticker-wrap{background:#D4A953;overflow:hidden;padding:.6rem 0;white-space:nowrap}
    .ticker-track{display:inline-flex;animation:ticker 24s linear infinite}
    .ticker-item{font-family:'Bebas Neue',cursive;font-size:.9rem;letter-spacing:.2em;color:#080810;padding:0 3rem}
    .ticker-sep{color:rgba(8,8,16,.35);padding:0 .5rem}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* ══ SECTION LABELS ═════════════════════════════════════ */
    .section-label{font-size:.65rem;font-weight:600;letter-spacing:.35em;text-transform:uppercase;color:#D4A953;display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
    .section-label::before{content:'';display:block;width:2rem;height:1px;background:#D4A953}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4rem);font-weight:700;line-height:1.05;color:#F5EDD8}
    .section-title em{font-style:italic;color:#D4A953}
    .gold-divider{width:3rem;height:1px;background:linear-gradient(to right,#D4A953,transparent);margin:1.5rem 0}
    .container{max-width:1200px;margin:0 auto;padding:0 4rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start}

    /* ══ SCROLL SECTION WRAPPER ══════════════════════════════
       Full-width wrapper that holds the scroll container.
       Feather divs (.scroll-feather) sit inside and are
       positioned absolutely. Width of feathers is set by JS
       to match the container's left offset exactly.         */
    .scroll-section-outer{position:relative;overflow:hidden}

    /* Feather overlays — color must match section bg exactly */
    .scroll-feather{
      position:absolute;top:0;bottom:0;
      z-index:8;pointer-events:none;
      width:4rem; /* overridden by JS */
    }
    .scroll-feather.feather-left{left:0}
    .scroll-feather.feather-right{right:0}
    /* Filmography bg at scroll area ≈ #0E0E1C */
    #filmography .feather-left{background:linear-gradient(to right,#0E0E1C,transparent)}
    #filmography .feather-right{background:linear-gradient(to left,#0E0E1C,transparent)}
    /* Lookbook bg at scroll area ≈ #0c0c1a */
    #lookbook .feather-left{background:linear-gradient(to right,#0c0c1a,transparent)}
    #lookbook .feather-right{background:linear-gradient(to left,#0c0c1a,transparent)}

    /* ══ FILMOGRAPHY ════════════════════════════════════════ */
    #filmography{padding:7rem 0;background:linear-gradient(180deg,#080810 0%,#0E0E1C 50%,#080810 100%)}
    .film-scroll-container{overflow-x:auto;padding:2rem 0 2.5rem;scrollbar-width:thin;scrollbar-color:#D4A953 transparent;cursor:grab}
    .film-scroll-container:active{cursor:grabbing}
    /* padding-left/right set dynamically by JS */
    .film-scroll-track{display:flex;gap:1.5rem;width:max-content}

    /* Film card */
    .film-card{flex:0 0 300px;background:#0E0E1C;border:1px solid rgba(212,169,83,.1);position:relative;overflow:hidden;cursor:pointer;transition:transform .45s ease,border-color .45s ease,box-shadow .45s ease}
    /* Gold top line — acting cards */
    .film-card:not(.dir-card)::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,#D4A953,transparent);z-index:2}
    /* Crimson top line — director cards */
    .film-card.dir-card{border-color:rgba(192,57,43,.15);background:#100a0a}
    .film-card.dir-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,#C0392B,transparent);z-index:2}
    .film-card-img{position:relative;aspect-ratio:2/3;overflow:hidden}
    /* Inactive: 58% grayscale */
    .film-card-img img{width:100%;height:100%;object-fit:cover;filter:grayscale(58%) contrast(1.02);transition:transform .55s ease,filter .55s ease}
    /* Overlay — description only, no title */
    .film-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,16,.95) 0%,rgba(8,8,16,.2) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem;opacity:0;transition:opacity .45s ease}
    .dir-card .film-card-overlay{background:linear-gradient(to top,rgba(16,4,4,.95) 0%,rgba(8,8,16,.2) 60%,transparent 100%)}
    .film-card-body{padding:1.25rem}
    .film-year{font-family:'Bebas Neue',cursive;font-size:.8rem;letter-spacing:.25em;color:#D4A953;margin-bottom:.4rem}
    .dir-card .film-year{color:#C0392B}
    .film-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:#F5EDD8;margin-bottom:.3rem;line-height:1.2}
    .film-role{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#7A7060}
    .dir-card .film-role{color:rgba(192,57,43,.8)}
    /* Format badges */
    .film-badge{position:absolute;top:.75rem;right:.75rem;padding:.2rem .65rem;font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;z-index:3}
    .badge-feature{background:#C0392B;color:#F5EDD8}
    .badge-short{background:#D4A953;color:#080810}
    .badge-music{background:transparent;border:1px solid #F5EDD8;color:#F5EDD8}
    /* Active state (JS-applied) */
    .film-card.active{transform:translateY(-8px);border-color:rgba(212,169,83,.45);box-shadow:0 12px 40px rgba(0,0,0,.4)}
    .film-card.dir-card.active{border-color:rgba(192,57,43,.5)}
    .film-card.active .film-card-img img{transform:scale(1.07);filter:grayscale(0%) contrast(1.08)}
    .film-card.active .film-card-overlay{opacity:1}
    /* Mobile: reduced lift */
    @media(max-width:900px){.film-card.active{transform:translateY(-4px)}}

    /* ══ ABOUT ══════════════════════════════════════════════ */
    #about{padding:7rem 0;background:#080810;position:relative}
    #about::before{content:'NASEEF';position:absolute;top:50%;left:-1rem;transform:translateY(-50%) rotate(-90deg);font-family:'Bebas Neue',cursive;font-size:10rem;color:rgba(212,169,83,.022);pointer-events:none;white-space:nowrap;letter-spacing:.2em;user-select:none}
    .stat-card{border:1px solid rgba(212,169,83,.15);padding:1.5rem;position:relative;background:rgba(14,14,28,.5);transition:border-color .3s,background .3s;cursor:default}
    .stat-card:hover{border-color:rgba(212,169,83,.45);background:rgba(14,14,28,.9)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:#D4A953;transition:height .4s}
    .stat-card:hover::before{height:100%}
    .stat-number{font-family:'Bebas Neue',cursive;font-size:3rem;color:#D4A953;line-height:1;margin-bottom:.25rem}
    .stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#7A7060;font-weight:500}
    /* Language badges — clickable */
    .lang-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .85rem;border:1px solid rgba(212,169,83,.25);font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#D4A953;transition:all .3s;cursor:pointer;position:relative}
    .lang-badge:hover{background:rgba(212,169,83,.1);border-color:#D4A953}
    .lang-badge::after{content:'▶';font-size:.45rem;opacity:.45;margin-left:.25rem}
    .profile-table{border:1px solid rgba(212,169,83,.12);padding:1.75rem;background:rgba(14,14,28,.4);transition:border-color .4s,background .4s;cursor:default}
    .profile-table:hover{border-color:rgba(212,169,83,.4);background:rgba(14,14,28,.75)}
    .profile-row{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0;border-bottom:1px solid rgba(212,169,83,.08);transition:border-color .3s}
    .profile-table:hover .profile-row{border-color:rgba(212,169,83,.14)}
    .profile-row:last-child{border-bottom:none}
    .profile-key{font-size:.65rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#7A7060;transition:color .3s}
    .profile-val{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:#F5EDD8;transition:color .3s}
    .profile-table:hover .profile-key{color:#9A9080}
    .profile-table:hover .profile-val{color:#fff}
    .about-training-box{border:1px solid rgba(212,169,83,.15);padding:1.25rem;background:rgba(14,14,28,.4);position:relative}
    .about-training-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,#D4A953,#C0392B)}

    /* ══ LOOKBOOK — HORIZONTAL SCROLL ═══════════════════════ */
    #lookbook{padding:7rem 0 0;background:linear-gradient(180deg,#080810 0%,#0E0E1C 60%,#080810 100%)}
    /* Full viewport height minus header area */
    .lookbook-scroll-outer{
      overflow-x:auto;
      height:calc(100vh - 16rem);
      min-height:380px;
      max-height:680px;
      padding-bottom:1rem;
      scrollbar-width:thin;
      scrollbar-color:#D4A953 transparent;
      cursor:grab;
      -webkit-overflow-scrolling:touch;
    }
    .lookbook-scroll-outer:active{cursor:grabbing}
    /* padding-left/right set by JS to match container */
    .lookbook-track{display:flex;gap:0;align-items:stretch;width:max-content;height:100%}
    /* Panel */
    .lb-panel{display:flex;align-items:stretch;gap:6px;margin-right:24px;position:relative;height:100%}
    .lb-panel:last-child{margin-right:0}
    .lb-panel+.lb-panel::before{content:'';position:absolute;left:-13px;top:10%;height:80%;width:1px;background:linear-gradient(to bottom,transparent,rgba(212,169,83,.28),transparent);pointer-events:none}
    /* Cells — 42% grayscale on desktop (inactive) */
    .lb-cell{position:relative;overflow:hidden;cursor:pointer;flex-shrink:0}
    .lb-cell img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(42%);transition:transform .6s ease,filter .6s ease}
    .lb-overlay{position:absolute;inset:0;backgrou    </div>
    <p class="lang-modal-label" id="lang-modal-label"></p>
  </div>
</div>

  <button id="lb-close" aria-label="Close">&times;</button>
  <button id="lb-prev" aria-label="Previous">&#8592;</button>

</div>

    <a href="#filmography" class="nav-link">Filmography</a>

<!-- ════════════════════════ JAVASCRIPT ══════════════════════ -->
<script>
  /* ── CURSOR ───────────────────────────────────────────── */
  const curO = document.getElementById('cursor-outer');
  const curI = document.getElementById('cursor-inner');
  let ox=0,oy=0,tx=0,ty=0;
  document.addEventListener('mousemove', e => {
    tx=e.clientX; ty=e.clientY;
    curI.style.left=tx+'px'; curI.style.top=ty+'px';
  });
  (function loop(){
    ox+=(tx-ox)*.12; oy+=(ty-oy)*.12;
    curO.style.left=ox+'px'; curO.style.top=oy+'px';
    requestAnimationFrame(loop);
  })();
  /* Cursor scale — interactive elements only
     NOT: stat cards, skill tags, profile table */
  document.querySelectorAll('a, button, .film-card, .lb-cell, .lang-badge').forEach(el => {
    el.addEventListener('mouseenter', () => {
      curO.style.transform='translate(-50%,-50%) scale(1.8)';
      curO.style.borderColor='#C0392B';
    });
    el.addEventListener('mouseleave', () => {
      curO.style.transform='translate(-50%,-50%) scale(1)';
      curO.style.borderColor='#D4A953';
    });
  });

  /* ── NAVBAR ──────────────────────────────────────────── */
  const nav = document.getElementById('navbar');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60), { passive:true });

  /* ── MOBILE MENU ─────────────────────────────────────── */
  function toggleMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('active');
  }

  /* ── TYPEWRITER ──────────────────────────────────────── */
  const roles = ['Lead in Soothravakyam','Hero in Shilpa','Hero in Oru Middleclass Padam','Lead in Favorite Spot'];
  let ri=0,ci=0,del=false;
  const tw = document.getElementById('typewriter');
  function type() {
    const cur = roles[ri];
    if (!del) {
      tw.textContent = cur.substring(0,ci+1); ci++;
      if (ci===cur.length) { del=true; setTimeout(type,1800); return; }
      setTimeout(type,65);
    } else {
      tw.textContent = cur.substring(0,ci-1); ci--;
      if (ci===0) { del=false; ri=(ri+1)%roles.length; setTimeout(type,300); return; }
      setTimeout(type,30);
    }
  }
  setTimeout(type,1200);

  /* ── SCROLL REVEAL ───────────────────────────────────── */
  const ro = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); ro.unobserve(e.target); } });
  }, { threshold:.1 });
  document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

  /* ── COUNT-UP ────────────────────────────────────────── */
  const cob = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const t = parseInt(e.target.getAttribute('data-target')); let c=0;
      const tmr = setInterval(() => { c+=t/40; if(c>=t){c=t;clearInterval(tmr);} e.target.textContent=Math.floor(c)+'+'; },35);
      cob.unobserve(e.target);
    });
  }, { threshold:.5 });
  document.querySelectorAll('.count-num').forEach(el => cob.observe(el));

  /* ── LANGUAGE VIDEO MODAL ────────────────────────────── */
  const langModal    = document.getElementById('lang-modal');
  const langIframe   = document.getElementById('lang-iframe');
  const langLabel    = document.getElementById('lang-modal-label');
  const langClose    = document.getElementById('lang-modal-close');

  function openLangModal(videoUrl, label) {
    langIframe.src = videoUrl;
    langLabel.textContent = label;
    langModal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLangModal() {
    langModal.classList.remove('open');
    langIframe.src = ''; // stops video playback
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.lang-badge').forEach(badge => {
    badge.addEventListener('click', () => {
      openLangModal(
        badge.getAttribute('data-video'),
        badge.getAttribute('data-label')
      );
    });
  });
  langClose.addEventListener('click', closeLangModal);
  langModal.addEventListener('click', e => { if(e.target===langModal) closeLangModal(); });
  document.addEventListener('keydown', e => {
    if (e.key==='Escape' && langModal.classList.contains('open')) closeLangModal();
  });

  /* Auto-close when YouTube video ends via postMessage API */
  window.addEventListener('message', e => {
    try {
      const data = JSON.parse(e.data);
      /* YouTube player state 0 = ended */
      if (data.event==='onStateChange' && data.info===0) closeLangModal();
    } catch(err) {}
  });

  /* ── FILMOGRAPHY — ACTIVE CARD SYSTEM ────────────────── */
  const filmCards  = Array.from(document.querySelectorAll('.film-card'));
  const filmScroll = document.getElementById('filmScroll');
  let filmMouseDownX = 0, filmDragged = false;

  function setActiveFilmCard(card) {
    filmCards.forEach(c => c.classList.remove('active'));
    if (card) card.classList.add('active');
  }
  setActiveFilmCard(filmCards[0]);

  /* Desktop: hover transfers, persists on leave */
  filmCards.forEach(card => {
    card.addEventListener('mouseenter', () => {
      if (window.innerWidth > 900) setActiveFilmCard(card);
    });
  });

  /* Click to open link — drag-safe */
  filmScroll.addEventListener('mousedown', e => { filmMouseDownX=e.clientX; filmDragged=false; });
  filmScroll.addEventListener('mousemove', e => { if(Math.abs(e.clientX-filmMouseDownX)>5) filmDragged=true; });
  filmScroll.addEventListener('click', e => {
    if (filmDragged) return;
    const card = e.target.closest('.film-card');
    if (!card) return;
    const href = card.getAttribute('data-href');
    if (href) window.open(href,'_blank','noopener');
  });

  /* Drag to scroll — filmography */
  let filmIsDown=false, filmStartX, filmScrollLeft;
  filmScroll.addEventListener('mousedown', e => { filmIsDown=true; filmStartX=e.pageX-filmScroll.offsetLeft; filmScrollLeft=filmScroll.scrollLeft; });
  filmScroll.addEventListener('mouseleave', () => filmIsDown=false);
  filmScroll.addEventListener('mouseup',    () => filmIsDown=false);
  filmScroll.addEventListener('mousemove',  e => {
    if (!filmIsDown) return; e.preventDefault();
    filmScroll.scrollLeft = filmScrollLeft - (e.pageX-filmScroll.offsetLeft-filmStartX)*1.8;
  });

  /* Mobile: center card active on scroll/touch */
  function updateFilmActiveOnScroll() {
    if (window.innerWidth > 900) return;
    const containerRect = filmScroll.getBoundingClientRect();
    const center = containerRect.left + containerRect.width/2;
    let closest=null, closestDist=Infinity;
    filmCards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const dist = Math.abs(rect.left + rect.width/2 - center);
      if (dist < closestDist) { closestDist=dist; closest=card; }
    });
    if (closest) setActiveFilmCard(closest);
  }
  filmScroll.addEventListener('scroll',   updateFilmActiveOnScroll, { passive:true });
  filmScroll.addEventListener('touchmove',updateFilmActiveOnScroll, { passive:true });
  filmScroll.addEventListener('touchend', () => setTimeout(updateFilmActiveOnScroll,80));

  /* ── LOOKBOOK — ACTIVE CELL SYSTEM (desktop only) ────── */
  const lbCells   = Array.from(document.querySelectorAll('.lb-cell'));
  const lookScroll = document.getElementById('lookScroll');

  function setActiveLbCell(cell) {
    lbCells.forEach(c => c.classList.remove('active'));
    if (cell) cell.classList.add('active');
  }
  /* First cell active on load (desktop only) */
  if (window.innerWidth > 900) setActiveLbCell(lbCells[0]);

  lbCells.forEach(cell => {
    cell.addEventListener('mouseenter', () => {
      if (window.innerWidth > 900) setActiveLbCell(cell);
    });
  });
  /* Mobile: all full color — no active system */

  /* ── LIGHTBOX ────────────────────────────────────────── */
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  let lbCur=0, lbMouseDownX=0, lbDragged=false;

  function openLB(i) {
    lbCur=i;
    lbImg.src=lbCells[i].getAttribute('data-src');
    lbCap.textContent=lbCells[i].getAttribute('data-tag');
    lb.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function closeLB() { lb.classList.remove('open'); document.body.style.overflow=''; }

  lookScroll.addEventListener('mousedown', e => { lbMouseDownX=e.clientX; lbDragged=false; });
  lookScroll.addEventListener('mousemove', e => { if(Math.abs(e.clientX-lbMouseDownX)>5) lbDragged=true; });
  lookScroll.addEventListener('click', e => {
    if (lbDragged) return;
    const cell = e.target.closest('.lb-cell');
    if (!cell) return;
    const idx = lbCells.indexOf(cell);
    if (idx > -1) openLB(idx);
  });

  document.getElementById('lb-close').addEventListener('click', closeLB);
  document.getElementById('lb-prev').addEventListener('click', () => openLB((lbCur-1+lbCells.length)%lbCells.length));
  document.getElementById('lb-next').addEventListener('click', () => openLB((lbCur+1)%lbCells.length));
  lb.addEventListener('click', e => { if(e.target===lb) closeLB(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key==='Escape')     closeLB();
    if (e.key==='ArrowLeft')  openLB((lbCur-1+lbCells.length)%lbCells.length);
    if (e.key==='ArrowRight') openLB((lbCur+1)%lbCells.length);
  });

  /* Drag to scroll — lookbook */
  let lkIsDown=false, lkStartX, lkScrollLeft;
  lookScroll.addEventListener('mousedown', e => { lkIsDown=true; lkStartX=e.pageX-lookScroll.offsetLeft; lkScrollLeft=lookScroll.scrollLeft; });
  lookScroll.addEventListener('mouseleave', () => lkIsDown=false);
  lookScroll.addEventListener('mouseup',    () => lkIsDown=false);
  lookScroll.addEventListener('mousemove',  e => {
    if (!lkIsDown) return; e.preventDefault();
    lookScroll.scrollLeft = lkScrollLeft - (e.pageX-lookScroll.offsetLeft-lkStartX)*1.8;
  });

  /* ── HERO PARALLAX ───────────────────────────────────── */
  window.addEventListener('scroll', () => {
    const img = document.querySelector('.hero-image-panel img');
    if (img) img.style.transform = `translateY(${window.scrollY*.18}px)`;
  }, { passive:true });

  /* ── FORM ────────────────────────────────────────────── */
  function handleForm(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent='Sending...'; btn.disabled=true;
    setTimeout(() => {
      btn.textContent='✓ Sent';
      document.getElementById('form-success').style.display='block';
      e.target.reset();
    },1200);
  }
</script>
</body>
